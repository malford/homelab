zot:
  mountConfig: true
  configFiles:
    config.json: |-
      {
        "storage": { "rootDirectory": "/var/lib/registry" },
        "http": {
          "address": "0.0.0.0",
          "port": "5000",
          "readTimeout": "60s",
          "writeTimeout": "60s"
        },
        "log": { "level": "info" }
      }
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    className: nginx
    hosts:
      - host: &host registry.malford.io
        paths:
          - path: /
    tls:
      - secretName: zot-tls-certificate
        hosts:
          - *host
  persistence: true
  pvc:
    create: true
    storage: 10Gi
