app-template:
  controllers:
    ollama:
      containers:
        app:
          image:
            repository: docker.io/ollama/ollama
            tag: 0.20.2
    ui:
      containers:
        app:
          image:
            repository: ghcr.io/open-webui/open-webui
            tag: latest
          env:
            OLLAMA_BASE_URL: http://ollama.ollama.svc.cluster.local:11434

  service:
    ollama:
      controller: ollama
      ports:
        http:
          port: 11434
          protocol: HTTP
    ui:
      controller: ui
      ports:
        http:
          port: 8080
          protocol: HTTP

  ingress:
    nginx:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &ollamaHost ollama.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: ollama
                port: http
        - host: &uiHost ai.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: ui
                port: http
      tls:
        - hosts:
            - *ollamaHost
            - *uiHost
          secretName: ollama-tls-certificate
    tailscale:
      # Exposes Ollama API to your tailnet so Aperture can reach it at:
      #   https://ollama.tail811db.ts.net/v1
      className: tailscale
      hosts:
        - host: ollama
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: ollama
                port: http
      tls:
        - hosts:
            - ollama

  persistence:
    data:
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        ollama:
          app:
            - path: /root/.ollama

