app-template:
  controllers:
    pairdrop:
      containers:
        app:
          image:
            repository: lscr.io/linuxserver/pairdrop
            tag: 1.11.2
  service:
    app:
      controller: pairdrop
      ports:
        http:
          port: 3000
  ingress:
    app:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host drop.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http
      tls:
        - hosts:
            - *host
          secretName: pairdrop-tls-certificate
