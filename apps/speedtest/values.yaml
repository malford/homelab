app-template:
  controllers:
    speedtest:
      containers:
        app:
          image:
            repository: docker.io/openspeedtest/latest
            tag: latest
  service:
    app:
      controller: speedtest
      ports:
        http:
          port: 3000
  ingress:
    app:
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: 50m
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host speedtest.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http
      tls:
        - hosts:
            - *host
          secretName: speedtest-tls-certificate
