app-template:
  controllers:
    paperless:
      containers:
        app:
          image:
            repository: ghcr.io/paperless-ngx/paperless-ngx
            tag: 2.19.4
          env:
            PAPERLESS_AUDIT_LOG_ENABLED: true
            PAPERLESS_PORT: 8000
            PAPERLESS_ADMIN_USER: admin
            PAPERLESS_URL: https://paperless.malford.io
          envFrom:
            - secret: "{{ .Release.Name }}-secret"
        redis:
          image:
            repository: docker.io/library/redis
            tag: 8.2.3
  service:
    app:
      controller: paperless
      ports:
        http:
          port: 8000
  ingress:
    app:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host paperless.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http
      tls:
        - hosts:
            - *host
          secretName: paperless-tls-certificate
  persistence:
    data:
      type: persistentVolumeClaim
      storageClass: standard-rwo
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        paperless:
          app:
            - path: /usr/src/paperless/data
              subPath: data
            - path: /usr/src/paperless/media
              subPath: media
