app-template:
  controllers:
    actualbudget:
      containers:
        app:
          image:
            repository: docker.io/actualbudget/actual-server
            tag: 26.6.0-alpine
  service:
    app:
      controller: actualbudget
      ports:
        http:
          port: 5006
  ingress:
    app:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host budget.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http
      tls:
        - hosts:
            - *host
          secretName: actualbudget-tls-certificate
  persistence:
    data:
      type: persistentVolumeClaim
      storageClass: standard-rwo
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /data
