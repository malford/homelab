apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Release.Namespace }}
data:
  # The gateway token is injected at runtime via OPENCLAW_GATEWAY_TOKEN env var
  # bind: lan required for K8s — pod has no tailscale0 interface.
  # Tailscale Operator handles the tailnet perimeter externally.
  # bind: tailnet falls back to 127.0.0.1 and breaks the ingress.
  openclaw.json: |
    {
      "gateway": {
        "bind": "lan",
        "port": 18789,
        "auth": { "mode": "token" },
        "trustedProxies": ["10.0.0.0/8"],
        "controlUi": {
          "allowedOrigins": ["https://openclaw-gateway.tail811db.ts.net"],
          "pairing": false
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "anthropic/claude-sonnet-4-6"
          },
          "heartbeat": {
            "every": "30m"
          },
          "userTimezone": "America/New_York",
          "envelopeTimezone": "user",
          "memorySearch": {
            "provider": "openai"
          },
          "thinkingDefault": "adaptive",
          "compaction": {
            "mode": "default"
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": [ "tg:6913292585" ],
          "defaultTo": "6913292585",
          "execApprovals": {
            "enabled": true,
            "target": "dm",
            "approvers": ["6913292585"]
          },
          "capabilities": {
            "inlineButtons": "all"
          }
        }
      }
    }
