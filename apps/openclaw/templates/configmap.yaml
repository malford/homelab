apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Release.Namespace }}
data:
  # The gateway token is injected at runtime via OPENCLAW_GATEWAY_TOKEN env var
  # bind: lan required for K8s — pod has no tailscale0 interface.
  # Tailscale Operator handles the tailnet perimeter externally.
  # bind: tailnet falls back to 127.0.0.1 and breaks the ingress.
  openclaw.json: |
    {
      "gateway": {
        "bind": "lan",
        "port": 18789,
        "auth": { "mode": "token" },
        "trustedProxies": ["10.0.0.0/8"],
        "controlUi": {
          "allowedOrigins": ["https://openclaw-gateway.tail811db.ts.net"]
        }
      },
      "agents": {
        "list": [
          {
            "id": "main",
            "name": "Ni",
            "identity": {
              "name": "Ni",
              "emoji": "🐾",
              "avatar": "avatar.jpg"
            }
          }
        ],
        "defaults": {
          "model": {
            "primary": "aperture/claude-sonnet-4-6"
          },
          "heartbeat": {
            "every": "30m"
          },
          "userTimezone": "America/New_York",
          "envelopeTimezone": "user",
          "memorySearch": {
            "provider": "ollama",
            "model": "mxbai-embed-large",
            "remote": {
              "baseUrl": "ollama.ollama.svc.cluster.local:11434",
              "apiKey": "-"
            }
          },
          "thinkingDefault": "off",
          "compaction": {
            "mode": "default"
          }
        }
      },
      "models": {
        "providers": {
          "aperture": {
            "baseUrl": "http://aperture.openclaw.svc.cluster.local",
            "apiKey": "-",
            "api": "anthropic-messages",
            "models": [
              {
                "id": "claude-sonnet-4-6",
                "name": "Claude Sonnet 4.6"
              }
            ]
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": [ "tg:6913292585" ],
          "defaultTo": "6913292585",
          "execApprovals": {
            "enabled": true,
            "target": "dm",
            "approvers": ["6913292585"]
          },
          "capabilities": {
            "inlineButtons": "all"
          },
          "ackReaction": "👀",
          "pollingStallThresholdMs": 30000,
          "healthMonitor": {
            "enabled": true
          }
        }
      },
      "plugins": {
        "entries": {
          "anthropic": {
            "enabled": true
          }
        }
      },
      "auth": {
        "profiles": {
          "anthropic:manual": {
            "provider": "anthropic",
            "mode": "token"
          }
        }
      }
    }

  gitea.json: |
    {
      "instances": [
        {
          "name": "default",
          "url": "${GITEA_URL}",
          "oauth": {
            "clientId": "9a295fc8-fe8e-4de6-929f-123ea190f589",
            "clientSecret": "${GITEA_OAUTH_SECRET}",
            "redirectUri": "https://openclaw-gateway.tail811db.ts.net/oauth/callback"
          }
        }
      ]
    }
