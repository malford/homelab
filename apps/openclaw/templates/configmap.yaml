apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Release.Namespace }}
data:
  # The gateway token is injected at runtime via OPENCLAW_GATEWAY_TOKEN env var
  # from the openclaw-secret ExternalSecret — no need to set it here.
  openclaw.json: |
    {
      "gateway": {
        "bind": "tailnet",
        "port": 18789,
        "auth": {
          "mode": "token"
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "anthropic/claude-sonnet-4-6"
          },
          "heartbeat": {
            "every": "30m"
          },
          "userTimezone": "America/New_York",
          "envelopeTimezone": "user",
          "memorySearch": {
            "provider": "openai"
          },
          "thinkingDefault": "adaptive",
          "compaction": {
            "mode": "default"
          }
        }
      }
    }
