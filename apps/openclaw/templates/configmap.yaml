apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Release.Namespace }}
data:
  # The gateway token is injected at runtime via OPENCLAW_GATEWAY_TOKEN env var
  # from the openclaw-secret ExternalSecret — no need to set it here.
  openclaw.json: |
    {
      "gateway": {
        "bind": "lan",
        "port": 18789,
        "auth": {
          "allowTailscale": true
        }
      }
    }
