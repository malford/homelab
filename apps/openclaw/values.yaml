app-template:
  controllers:
    main:
      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      initContainers:
        config:
          image:
            repository: docker.io/library/busybox
            tag: latest
          command:
            - sh
            - -c
            - cp /tmp/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json
      containers:
        main:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: latest
          env:
            OPENCLAW_GATEWAY_PORT: "18789"
            NODE_ENV: "production"
          envFrom:
            - secret: openclaw-secret
  service:
    main:
      ports:
        http:
          port: 18789
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host openclaw.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - hosts:
            - *host
          secretName: openclaw-tls-certificate
  persistence:
    data:
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /home/node/.openclaw
          config:
            - path: /home/node/.openclaw
    config:
      type: configMap
      name: openclaw-config
      advancedMounts:
        main:
          config:
            - path: /tmp/openclaw-config
