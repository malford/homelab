app-template:
  controllers:
    main:
      pod:
        annotations:
          config-version: "17"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      initContainers:
        init-config:
          image:
            repository: docker.io/library/alpine
            tag: latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              apk add envsubst &&
              cp /tmp/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json &&
              envsubst < /tmp/openclaw-config/gitea.json > /home/node/.openclaw/gitea.json &&
              chmod 600 /home/node/.openclaw/openclaw.json &&
              chmod 600 /home/node/.openclaw/gitea.json &&
              chmod 700 /home/node/.openclaw &&
              chown -R 1000:1000 /home/node/.openclaw
      containers:
        main:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: latest
          env:
            TZ: "America/New_York"
            OPENCLAW_GATEWAY_PORT: "18789"
            NODE_ENV: "production"
          envFrom:
            - secret: openclaw-secret
  service:
    main:
      ports:
        http:
          port: 18789
          protocol: HTTP
  persistence:
    data:
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /home/node/.openclaw
          init-config:
            - path: /home/node/.openclaw
    configmap:
      type: configMap
      name: openclaw-config
      advancedMounts:
        main:
          init-config:
            - path: /tmp/openclaw-config
