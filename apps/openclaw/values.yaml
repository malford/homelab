app-template:
  controllers:
    openclaw:
      pod:
        annotations:
          config-version: "19"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      initContainers:
        init-config:
          image:
            repository: docker.io/library/alpine
            tag: latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              apk add envsubst &&
              mkdir -p /home/node/.openclaw/skills/gitea &&
              if [ "$(cat /home/node/.openclaw/.config-version 2>/dev/null)" != "19" ]; then
                cp /tmp/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json
                echo "19" > /home/node/.openclaw/.config-version
              fi &&
              envsubst < /tmp/openclaw-config/gitea.json > /home/node/.openclaw/skills/gitea/gitea.json &&
              chmod 600 /home/node/.openclaw/openclaw.json &&
              chmod 600 /home/node/.openclaw/skills/gitea/gitea.json &&
              chmod 700 /home/node/.openclaw &&
              chown -R 1000:1000 /home/node/.openclaw
          envFrom:
            - secretRef:
                name: openclaw-secret
      containers:
        main:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: latest
          env:
            TZ: "America/New_York"
            OPENCLAW_GATEWAY_PORT: "18789"
            NODE_ENV: "production"
          envFrom:
            - secretRef:
                name: openclaw-secret

  service:
    openclaw:
      controller: openclaw
      ports:
        http:
          port: 18789
          protocol: HTTP

  persistence:
    data:
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        openclaw:
          main:
            - path: /home/node/.openclaw
          init-config:
            - path: /home/node/.openclaw
    configmap:
      type: configMap
      name: openclaw-config
      advancedMounts:
        openclaw:
          init-config:
            - path: /tmp/openclaw-config
