app-template:
  controllers:
    main:
      pod:
        annotations:
          config-version: "1"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      initContainers:
        init-config:
          image:
            repository: docker.io/library/busybox
            tag: latest
          command:
            - sh
            - -c
            - cp /tmp/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json
      containers:
        main:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: latest
          env:
            TZ: "America/New_York"
            OPENCLAW_GATEWAY_PORT: "18789"
            NODE_ENV: "production"
          envFrom:
            - secret: openclaw-secret
  service:
    main:
      ports:
        http:
          port: 18789
          protocol: HTTP
  persistence:
    data:
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /home/node/.openclaw
          init-config:
            - path: /home/node/.openclaw
    configmap:
      type: configMap
      name: openclaw-config
      advancedMounts:
        main:
          init-config:
            - path: /tmp/openclaw-config
