app-template:
  defaultPodOptions:
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - metal0v2
                    - metal1v2

  controllers:
    scrypted:
      type: statefulset
      strategy: OnDelete
      containers:
        app:
          image:
            repository: ghcr.io/koush/scrypted
            tag: v0.144.1-noble-full
          env:
            TZ: America/New_York
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
        eufy-ws:
          image:
            repository: docker.io/bropat/eufy-security-ws
            tag: latest
          env:
            USERNAME:
              valueFrom:
                secretKeyRef:
                  name: eufy-credentials
                  key: USERNAME
            PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: eufy-credentials
                  key: PASSWORD
            COUNTRY: US
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
        event-syncer:
          image:
            repository: registry.malford.io/eufy-event-syncer
            tag: 0.1.3
          env:
            WS_URL: ws://localhost:3000
            OUTPUT_DIR: /events
            POLL_INTERVAL_SECONDS: "1800"
            LOOKBACK_HOURS: "6"
            LOG_LEVEL: DEBUG
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi

  service:
    main:
      controller: scrypted
      ports:
        https:
          port: 10443
          protocol: TCP

  ingress:
    nginx:
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/backend-protocol: HTTPS
      hosts:
        - host: &scryptedHost scrypted.malford.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: https
      tls:
        - secretName: scrypted-tls-certificate
          hosts:
            - *scryptedHost
    tailscale:
      className: tailscale
      hosts:
        - host: scrypted
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: https
      tls:
        - hosts:
            - scrypted

  persistence:
    config:
      type: persistentVolumeClaim
      storageClass: standard-rwo
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        scrypted:
          app:
            - path: /server/volume
    recordings:
      type: persistentVolumeClaim
      storageClass: standard-rwo
      accessMode: ReadWriteOnce
      size: 100Gi
      advancedMounts:
        scrypted:
          app:
            - path: /nvr
    eufy-ws-data:
      type: persistentVolumeClaim
      storageClass: standard-rwo
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        scrypted:
          eufy-ws:
            - path: /data
    events:
      type: persistentVolumeClaim
      existingClaim: eufy-events
      advancedMounts:
        scrypted:
          event-syncer:
            - path: /events
