---
apiVersion: v1
kind: Namespace
metadata:
  name: tailscale-operator
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://git.malford.io/ops/homelab'
    path: apps/tailscale-operator
    targetRevision: HEAD
  destination:
    name: in-cluster
    namespace: tailscale-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
