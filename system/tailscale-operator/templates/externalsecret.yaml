---
# Pulls the Tailscale OAuth client credentials from your existing ClusterSecretStore.
#
# Required keys in your secret store (same store used by other apps: global-secrets):
#   tailscale-operator-client-id     → OAuth client ID
#   tailscale-operator-client-secret → OAuth client secret
#
# Create these in your secret backend before deploying the operator.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-operator-oauth
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    name: operator-oauth
    template:
      type: Opaque
  data:
    - secretKey: client_id
      remoteRef:
        key: external
        property: tailscale-operator-client-id
    - secretKey: client_secret
      remoteRef:
        key: external
        property: tailscale-operator-client-secret
